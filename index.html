<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apiário J.E | Mel Artesanal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 120px; background-color: #FFD700; opacity: 0.35;
            filter: blur(45px); border-radius: 50%; z-index: 0;
        }
        .bottle-vector { fill: #D97706; }
        .pill-highlight {
            display: inline-block; background-color: #FFD700; color: #1C1917;
            padding: 2px 8px; border-radius: 9999px; font-size: 9px;
            font-weight: 600; margin-top: 4px; text-transform: uppercase;
        }
        #adminPanel { display: none; }
    </style>
</head>
<body class="text-stone-800 antialiased pb-20">

    <header class="relative py-16 px-6 text-center border-b border-stone-100 overflow-hidden">
        <div class="brand-glow"></div>
        <div class="relative z-10">
            <span class="block text-[10px] tracking-[0.4em] uppercase text-stone-500 mb-2 font-bold">Puro & Artesanal</span>
            <h1 class="text-4xl font-bold tracking-tight text-stone-900 serif">Apiário J.E</h1>
            <p class="text-amber-600 text-sm font-medium mt-1 uppercase tracking-widest">Mel 100% Natural</p>
        </div>
    </header>

    <section class="max-w-md mx-auto px-8 py-10 text-center">
        <p class="text-stone-600 leading-relaxed italic serif text-lg">
            "O Apiário J.E é uma empresa familiar que trabalha para proporcionar um ambiente agradável às abelhas para levar um produto de qualidade até você."
        </p>
    </section>

    <main id="product-list" class="max-w-md mx-auto px-6 space-y-6 pb-24">
        </main>

    <footer class="py-12 bg-stone-50 text-center relative">
        <p class="text-[9px] tracking-[0.5em] text-stone-400 font-bold uppercase">Apiário J.E</p>
        <button onclick="openAdmin()" class="absolute right-4 bottom-4 p-2 text-stone-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
        </button>
    </footer>

    <div id="adminPanel" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="font-bold text-stone-900 serif text-xl mb-2">Painel de Controle</h2>
            <div id="stockEditor" class="space-y-4"></div>
            <button onclick="saveAndGenerate()" class="w-full bg-stone-900 text-white font-bold py-3 rounded-2xl mt-6 uppercase text-xs tracking-widest">Salvar e Gerar Novo Código</button>
            <button onclick="closeAdmin()" class="w-full text-stone-400 mt-4 text-xs font-bold uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        /* ===========================================================
           ABERTURA MANUAL: ESTOQUE DE EMERGÊNCIA (ALTERE AQUI)
           Se o botão de configuração falhar, mude os números abaixo 
           e salve o arquivo.
           ===========================================================
        */
        const ESTOQUE_ATUAL = {
            "100ml": { qty: 10 },  // Mude o número 20 pela quantidade desejada
            "200ml": { qty: 15 }, 
            "500ml": { qty: 10 }, 
            "1Litro": { qty: 10 }
        };

        // Dados de exibição originais
        const PRODUTOS = {
            "100ml": { price: "8,00", label: "Ideal para experimentar", pill: "Sugestão" },
            "200ml": { price: "14,00", label: "Perfeito para presente", pill: "Destaque" },
            "500ml": { price: "25,00", label: "Escolha da Família", special: true },
            "1Litro": { price: "50,00", label: "Melhor custo-benefício", bestSeller: true }
        };

        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = '';

            Object.keys(PRODUTOS).forEach(key => {
                const info = PRODUTOS[key];
                const estoque = ESTOQUE_ATUAL[key].qty;
                const isOut = estoque <= 0;
                let html = '';

                if (key === "1Litro") {
                    html = `
                    <div class="bg-stone-900 p-7 rounded-[2.5rem] flex items-center justify-between shadow-2xl relative overflow-hidden ${isOut ? 'opacity-40 grayscale' : 'ring-4 ring-amber-500/10'}">
                        ${info.bestSeller && !isOut ? '<div class="absolute top-0 right-0 bg-amber-500 text-stone-900 px-3 py-1 font-black text-[8px] uppercase tracking-tighter rounded-bl-xl">O Mais Vendido</div>' : ''}
                        <div class="relative z-10 flex items-center space-x-4">
                            <svg class="w-10 h-10 fill-amber-400" viewBox="0 0 24 24"><path d="M13,3h-2C10.45,3,10,3.45,10,4v3.17c0,0.53-0.21,1.04-0.59,1.41L7.71,10.29C7.26,10.74,7,11.35,7,12v8 c0,1.1,0.9,2,2,2h6c1.1,0,2-0.9,2-2v-8c0-0.65-0.26-1.26-0.71-1.71L14.59,8.59C14.21,8.21,14,7.7,14,7.17V4C14,3.45,13.55,3,13,3z M15,20H9v-8h6V20z"/></svg>
                            <div>
                                <h3 class="font-bold text-white text-sm uppercase">Mel garrafa ${key}</h3>
                                <p class="text-amber-400 font-bold text-xs uppercase">${isOut ? 'INDISPONÍVEL' : info.label}</p>
                                <p class="text-white font-bold text-xl mt-1">R$ ${info.price}</p>
                            </div>
                        </div>
                        ${isOut ? '<span class="text-white text-[10px] font-black border border-white/20 px-3 py-2 rounded-xl">ESGOTADO</span>' : `<a href="https://wa.me/55091991952977?text=Olá! Quero mel de ${key}" class="bg-amber-500 text-stone-900 px-6 py-3 rounded-2xl text-xs font-black uppercase z-10">Comprar</a>`}
                    </div>`;
                } else {
                    html = `
                    <div class="bg-white border border-stone-100 p-5 rounded-3xl flex items-center justify-between shadow-sm relative ${isOut ? 'opacity-50' : ''} ${info.special && !isOut ? 'border-l-4 border-l-amber-400' : ''}">
                        <div class="flex items-center space-x-4">
                            <svg class="bottle-vector w-9 h-9" viewBox="0 0 24 24"><path d="M13,3h-2C10.45,3,10,3.45,10,4v3.17c0,0.53-0.21,1.04-0.59,1.41L7.71,10.29C7.26,10.74,7,11.35,7,12v8 c0,1.1,0.9,2,2,2h6c1.1,0,2-0.9,2-2v-8c0-0.65-0.26-1.26-0.71-1.71L14.59,8.59C14.21,8.21,14,7.7,14,7.17V4C14,3.45,13.55,3,13,3z M15,20H9v-8h6V20z"/></svg>
                            <div>
                                <h3 class="font-bold text-stone-900 text-sm">Mel garrafa ${key}</h3>
                                <p class="text-[10px] ${info.special ? 'text-amber-600 font-bold uppercase' : 'text-stone-400 italic'}">${isOut ? 'FORA DE ESTOQUE' : info.label}</p>
                                ${info.pill && !isOut ? `<div class="pill-highlight">${info.pill}</div>` : ''}
                                <p class="text-amber-600 font-bold mt-1">R$ ${info.price}</p>
                            </div>
                        </div>
                        ${isOut ? '<span class="text-stone-400 text-[10px] font-bold">Aguarde</span>' : `<a href="https://wa.me/55091991952977?text=Olá! Quero mel de ${key}" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Comprar</a>`}
                    </div>`;
                }
                container.innerHTML += html;
            });

            container.innerHTML += `
            <div class="bg-amber-50 border-2 border-dashed border-amber-200 p-5 rounded-3xl flex items-center justify-between shadow-sm">
                <div class="flex items-center space-x-4">
                    <div class="bg-white p-2 rounded-xl text-amber-600">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <div><h3 class="font-bold text-stone-900 text-sm">Fazer Encomenda</h3><p class="text-[10px] text-stone-500 leading-tight">Produtos personalizados de acordo<br>com sua necessidade</p></div>
                </div>
                <a href="https://wa.me/55091991952977?text=Olá! Gostaria de encomendar mel personalizado." class="bg-amber-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Solicitar</a>
            </div>`;
        }

        function openAdmin() {
            if(prompt("Senha:") === "2025") {
                const editor = document.getElementById('stockEditor');
                editor.innerHTML = '';
                Object.keys(ESTOQUE_ATUAL).forEach(key => {
                    editor.innerHTML += `
                    <div class="flex items-center justify-between bg-stone-50 p-3 rounded-xl">
                        <span class="text-xs font-bold">Garrafa ${key}</span>
                        <input type="number" id="adm-${key}" value="${ESTOQUE_ATUAL[key].qty}" class="w-20 p-1 border text-center font-bold">
                    </div>`;
                });
                document.getElementById('adminPanel').style.display = 'flex';
            }
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function saveAndGenerate() {
            Object.keys(ESTOQUE_ATUAL).forEach(key => {
                ESTOQUE_ATUAL[key].qty = parseInt(document.getElementById(`adm-${key}`).value);
            });
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'apiario-je-atualizado.html';
            a.click();
            renderProducts();
            closeAdmin();
        }

        renderProducts();
    </script>
</body>
</html>
